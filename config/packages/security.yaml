security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    role_hierarchy:
        ROLE_APP_ADMIN: [ROLE_SKLAD_ADMIN, ROLE_SKLAD_EDIT, ROLE_SKLAD_VIEW]
        ROLE_SKLAD_ADMIN: [ROLE_SKLAD_EDIT, ROLE_SKLAD_VIEW]
        ROLE_SKLAD_EDIT: [ROLE_SKLAD_VIEW]

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: username

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            user_checker: App\Security\UserChecker
            form_login:
                login_path: app_home
                check_path: app_home
                username_parameter: username
                password_parameter: password
                enable_csrf: true
                csrf_parameter: _csrf_token
                csrf_token_id: authenticate
                default_target_path: app_home
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 2592000
                path: /
                name: OP_SKLAD_REMEMBER
                always_remember_me: true
            logout:
                path: app_logout
                target: app_home

    access_control:
        - { path: ^/login$, roles: PUBLIC_ACCESS }
        - { path: ^/$, roles: PUBLIC_ACCESS }
        - { path: ^/sprava, roles: ROLE_APP_ADMIN }
        - { path: ^/sklad, roles: ROLE_SKLAD_VIEW }
        - { path: ^/, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
